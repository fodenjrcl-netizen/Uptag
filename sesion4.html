<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sesión 4: Calculadora</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#90CAF9] text-[#2C2C2C]">

  <!-- Encabezado -->
  <header class="bg-orange-600 text-white p-6 shadow-md">
    <div class="flex items-center justify-between">
  <h1 class="text-2xl font-bold">Sesión 4: Calculadora de Prueba de Hipótesis</h1>
  <a href="index.html"
     class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-white text-orange-600 text-sm font-medium border border-orange-600 shadow-sm hover:bg-orange-50 hover:text-orange-700 transition duration-300">
    ← Volver al menú principal
  </a>
</div>

    </nav>
  </header>

  <!-- Contenido principal -->
  <main class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
    <section>
      <h2 class="text-xl font-semibold text-orange-700 mb-4">Ingresa los datos</h2>
      <form id="calculadora" class="space-y-4">
        <div>
          <label for="media" class="block font-medium text-orange-800">Media poblacional (μ):</label>
          <input type="number" id="media" name="media" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
          <label for="mediaMuestra" class="block font-medium text-orange-800">Media muestral (x̄):</label>
          <input type="number" id="mediaMuestra" name="mediaMuestra" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
          <label for="desviacion" class="block font-medium text-orange-800">Desviación estándar (σ):</label>
          <input type="number" id="desviacion" name="desviacion" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
          <label for="n" class="block font-medium text-orange-800">Tamaño de la muestra (n):</label>
          <input type="number" id="n" name="n" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
          <label for="significancia" class="block font-medium text-orange-800">Nivel de significancia (α):</label>
          <input type="number" step="0.01" id="significancia" name="significancia" value="0.05" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <div>
          <label for="tipoPrueba" class="block font-medium text-orange-800">Tipo de prueba:</label>
          <select id="tipoPrueba" name="tipoPrueba" required class="w-full mt-1 p-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
            <option value="bilateral">Bilateral</option>
            <option value="unilateral-izquierda">Unilateral izquierda</option>
            <option value="unilateral-derecha">Unilateral derecha</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-orange-600 hover:scale-105 transition-transform text-white py-2 rounded-md hover:bg-orange-700 transition">Calcular</button>
      </form>

      <div id="resultado" class="mt-6 p-4 bg-orange-50 border border-orange-200 rounded-md text-center">
        <p class="text-lg font-semibold text-orange-700"></p>
      </div>
    </section>
  </main>

  <script src="js/calculadora.js"></script>
  <script src="js/animaciones.js"></script>
</body>
</html>
